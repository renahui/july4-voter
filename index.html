<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>July 4th Trip Voter</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
.modal-overlay { opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease; }
.modal-overlay.active { opacity: 1; visibility: visible; }
.modal-overlay.active #modal-content { transform: scale(1); }
.toast { visibility: hidden; opacity: 0; transition: opacity 0.3s, visibility 0.3s, transform 0.3s; transform: translateY(-20px); }
.toast.show { visibility: visible; opacity: 1; transform: translateY(0); }
.vote-btn { transition: all 0.2s ease; }
.vote-btn:active { transform: scale(0.9); }
</style>
</head>
<body class="min-h-screen text-gray-800 pb-28">

<header class="bg-blue-600 text-white p-6 rounded-b-3xl shadow-lg mb-8 max-w-2xl mx-auto">
  <h1 class="text-3xl font-extrabold text-center">🇺🇸 July 4th Weekend</h1>
  <p class="text-center text-blue-100 mt-2 text-sm">Vote for as many destinations as you like — once per place!</p>
</header>

<main class="max-w-md mx-auto px-4 space-y-6" id="destination-list"></main>

<div class="fixed bottom-0 left-0 w-full p-4 bg-white border-t border-gray-200 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] flex gap-3 justify-center z-50">

  <button onclick="shareLink()" class="flex-1 max-w-sm bg-black text-white font-bold py-4 px-8 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95 flex items-center justify-center gap-2">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
      <path d="M15 8a3 3 0 10-2.977-2.63l-4.94 2.47a3 3 0 100 4.319l4.94 2.47a3 3 0 10.895-1.789l-4.94-2.47a3.027 3.027 0 000-.74l4.94-2.47C13.456 7.68 14.19 8 15 8z"/>
    </svg>
    Copy Link & Share
  </button>
</div>

<div id="toast" class="toast fixed top-6 left-1/2 -translate-x-1/2 text-white px-5 py-3 rounded-full shadow-xl font-bold z-[70] flex items-center gap-2 text-sm">
  <span id="toast-icon"></span>
  <span id="toast-message"></span>
</div>

<div id="info-modal" class="modal-overlay fixed inset-0 bg-black bg-opacity-50 z-[60] flex items-center justify-center p-4 backdrop-blur-sm" onclick="closeModal(event)">
  <div class="bg-white rounded-3xl shadow-2xl max-w-lg w-full overflow-hidden transform scale-95 transition-transform duration-300" id="modal-content"></div>
</div>

<script>
const supabaseClient = window.supabase.createClient('https://xtnwhthfuvgqgpxqfuhg.supabase.co', 'sb_publishable_KbTMYWdazy6uen-p9HtooQ_kqbPeLSe');

const destinations = [
  { id:'mendocino', name:'Mendocino', desc:'Rugged coastal cliffs, Victorian charm, and serene art galleries.', img:'https://media.audleytravel.com/-/media/images/home/canada-and-the-usa/usa/places/istock_70194807_usa_mendocino_california_1028664_letterbox.jpg?q=60&w=1920&h=685', time:'4.5 hr', dest:'Mendocino,+CA', rednoteUrl:'http://xhslink.com/o/1k3BE7BNPXi', voteUrl: 'https://docs.google.com/forms/d/e/1FAIpQLSf4Kmy5PVCfqJfXUus1_Qbs3EMb9ypVPhZG53lqJ1RzjWDR5w/viewform?usp=pp_url&entry.1535147419=Mendocino', details:'Mendocino is a quiet, stunning escape known for its dramatic cliff-side views, preserved Victorian-era architecture, and local art galleries. It stays much cooler than the inland valleys, making it a perfect spot to escape the heat. It’s ideal for peaceful walks and enjoying the rugged Northern California coast.' },
  { id:'carmel', name:'Carmel-by-the-Sea', desc:'Coastal breeze, great food, very pet-friendly.', img:'https://lh3.googleusercontent.com/gps-cs-s/APNQkAGHTnK7GWJHCHe8K6Q0tDtQM7as7BwaX9gmpeNoSu1la9htR59sDQ3yD_LN_4Y_CGJTYrrsE6VWxgvb_OjYi4-NuXOhPg9CBW0BKLaswgDQ3k39EPqHcPXIvuWtdH5TuNg54WtqLtHAKHSi=w972-h562-n-k-no', time:'1 hr 15 mins', dest:'Carmel-by-the-Sea,+CA', rednoteUrl:'http://xhslink.com/o/ABdVuhtqe1d', voteUrl: 'https://docs.google.com/forms/d/e/1FAIpQLSf4Kmy5PVCfqJfXUus1_Qbs3EMb9ypVPhZG53lqJ1RzjWDR5w/viewform?usp=pp_url&entry.1535147419=Carmel-by-the-Sea', details:'Carmel is famous for its fairy-tale cottages, white-sand beach, and being incredibly pet-friendly. It will be cooler here (great to escape the heat). Easy to walk around town.' },
  { id:'sonoma', name:'Sonoma Valley', desc:'World-class wineries, rolling vineyards, and holiday BBQs.', img:'https://encrypted-tbn0.gstatic.com/licensed-image?q=tbn:ANd9GcQq00f1MgUSBxqHP3T5uzUpeFeQOy88jT_9NciwEIxkIeJjSju51Nk9BjxDAB_Wkf6B00S5p-SCqkYx1-KR6Y_uv0M&s=19', time:'2 hrs', dest:'Sonoma,+CA', rednoteUrl:'http://xhslink.com/o/9n0UGke44xW', voteUrl: 'https://docs.google.com/forms/d/e/1FAIpQLSf4Kmy5PVCfqJfXUus1_Qbs3EMb9ypVPhZG53lqJ1RzjWDR5w/viewform?usp=pp_url&entry.1535147419=Sonoma+Valley', details:'About a 2-hour drive north. Wineries lean heavily into the holiday—many are hosting special 4th of July barbecues and wine pairings. A perfect spot for a relaxed, scenic weekend.' },
  { id:'lavabeds', name:'Lava Beds NM', desc:'Explore underground lava tube caves in a high desert landscape.', img:'https://lh3.googleusercontent.com/gps-cs-s/APNQkAGlBGBWn2slHxw4KLSH1hE6CwNK42S70PLJANEfZpaMNWuQh-rzrjRIMNn8UqomcYnxIcmKl7OXQXm9knH0kiAfth_fB53aXILgWwxWV21Akp6eNUek8SHpwE1Vu03i7LHa8T2q=s1360-w1360-h1020-rw', time:'7.5 hrs ', dest:'Lava+Beds+National+Monument,+CA', rednoteUrl:'http://xhslink.com/o/4OvVLZeSi0P', voteUrl: 'https://docs.google.com/forms/d/e/1FAIpQLSf4Kmy5PVCfqJfXUus1_Qbs3EMb9ypVPhZG53lqJ1RzjWDR5w/viewform?usp=pp_url&entry.1535147419=Lava+Beds+NM', details:'A truly unique landscape where you can self-guide through over 20 lava tube caves created by ancient volcanic eruptions. ⚠️ This is a very long drive from Santa Clara — plan for significant travel time.' },
  { id:'shasta', name:'Lake Shasta Caverns', desc:'Boat ride across the lake to explore underground limestone caves.', img:'https://lh3.googleusercontent.com/gps-cs-s/APNQkAHb5qdUGR9Tt_r8xcr4U6JroX3eCm0lM0k3jzquMJXn6g68owWokXN73smNnNMBKikmW3KT8OdRxIso2HgySF9msDz6aE7L0pCJ1R0OA2Mr5SeWGDKUoj2ySb28Zl5dZqG4cwp67Z3wBqBU=s1360-w1360-h1020-rw', time:'4.5 hrs ', dest:'Lake+Shasta+Caverns+National+Natural+Landmark,+Shasta+Caverns+Road,+Lakehead,+CA', rednoteUrl:'http://xhslink.com/o/7qMhhBLx9zq', voteUrl: 'https://docs.google.com/forms/d/e/1FAIpQLSf4Kmy5PVCfqJfXUus1_Qbs3EMb9ypVPhZG53lqJ1RzjWDR5w/viewform?usp=pp_url&entry.1535147419=Lake+Shasta+Caverns', details:'Lake Shasta Caverns is a unique "show cave" only accessible by boat across Lake Shasta. You will take a boat, then a bus ride up the mountain, followed by a guided tour of the stunning limestone stalactites and stalagmites. Expect holiday traffic heading up I-5 North.' },
  { id:'lassen', name:'Lassen Volcanic NP', desc:'Geothermal features, boiling mud pots, and beautiful mountain lakes.', img:'https://lh3.googleusercontent.com/gps-cs-s/APNQkAGsqqGTx36Q7lyuejM6RFJV3-heRX13T_TdXI47jn3Su73B5hTY95XbcVeCwezfDEfJVhH51Z3nTBVlF7UfYQFO_aj6RJQwVo3NMYFagfElacD98HuMFKRbpj1uABEF-OcpNc2UJyK2Mi5g=s1360-w1360-h1020-rw', time:'4.5–5 hrs ', dest:'Lassen+Volcanic+National+Park,+California', rednoteUrl:'http://xhslink.com/o/2h5DFLgZTjA', voteUrl: 'https://docs.google.com/forms/d/e/1FAIpQLSf4Kmy5PVCfqJfXUus1_Qbs3EMb9ypVPhZG53lqJ1RzjWDR5w/viewform?usp=pp_url&entry.1535147419=Lassen+Volcanic+NP', details:'Lassen offers incredible volcanic features like Bumpass Hell (boiling mud pots and fumaroles) without the massive crowds of Yosemite. It stays cooler in summer due to higher elevation. A great choice for hiking and seeing unique geology.' },
  { id:'tahoe', name:'Lake Tahoe', desc:'Mountain air and synchronized fireworks over the lake.', img:'https://encrypted-tbn0.gstatic.com/licensed-image?q=tbn:ANd9GcSAjcASmkkrnYCpal0GMvq5VY_3LxTUEF0KYpA-JZl3jwUl3wByqMrZUJ0OOLKbBVimfwoh3iO2srW_igMnf9126CY&s=19', time:'4 hrs ', dest:'South+Lake+Tahoe,+CA', rednoteUrl:'http://xhslink.com/o/AAnC5SC7Ehp', voteUrl: 'https://docs.google.com/forms/d/e/1FAIpQLSf4Kmy5PVCfqJfXUus1_Qbs3EMb9ypVPhZG53lqJ1RzjWDR5w/viewform?usp=pp_url&entry.1535147419=Lake+Tahoe', details:'South Lake Tahoe boasts an amazing "Lights on the Lake" fireworks show. Expect gorgeous scenery but also heavier holiday traffic and potentially higher costs for last-minute booking.' }
];

const ORIGIN = 'Santa+Clara,+CA';
const MY_VOTES_KEY = 'july4_my_votes'; // now a SET of ids
let userLocation = null;
let currentVotes = {};
let myVotes = new Set(); // tracks which destinations this user has voted for



// --- Persistence ---
const saveMyVotes = () => localStorage.setItem(MY_VOTES_KEY, JSON.stringify([...myVotes]));
const loadMyVotes = () => {
  try {
    const stored = JSON.parse(localStorage.getItem(MY_VOTES_KEY) || '[]');
    // only keep ids that still exist
    return new Set(stored.filter(id => destinations.find(d => d.id === id)));
  } catch { return new Set(); }
};

// --- Map ---
const buildMapUrl = (dest) => {
  const origin = userLocation ? `${userLocation.lat},${userLocation.lng}` : ORIGIN;
  return `https://www.google.com/maps/dir/${origin}/${dest.dest}`;
};

const getUserLocation = () => new Promise(resolve => {
  if (!navigator.geolocation) return resolve(null);
  navigator.geolocation.getCurrentPosition(
    pos => { userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude }; resolve(userLocation); },
    () => resolve(null)
  );
});

// --- Voting ---
// --- Database Logic ---
/ Updated Vote function
const vote = async (id) => {
  const dest = destinations.find(d => d.id === id);
  
  // Save to Supabase
  const { error } = await supabase.from('votes').insert([{ destination_name: dest.name }]);
  
  if (error) {
    alert("Error saving vote: " + error.message);
  } else {
    // Instead of reloading, show a success message
    alert(`Voted for ${dest.name}! 🎉`);
    
    // Optional: If you want to change the button color after voting, 
    // you could call a function to refresh the UI here
  }
};

const subscribeToVoteUpdates = () => {
  supabaseClient
    .channel('votes-changes')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'votes' }, async () => {
      await fetchVoteCounts();
      renderDestinations();
    })
    .subscribe();
};
const vote = async (id) => {
  const dest = destinations.find(d => d.id === id);
  if (myVotes.has(id)) return; // already voted for this place, ignore repeat clicks

  // Save to Real Database
  const { error } = await supabaseClient
    .from('votes')
    .insert([{ destination_name: dest.name }]);

  if (error) {
    showToast("Error saving to database!", false);
    console.error(error);
    return;
  }

  // Update local state so the UI reflects the vote immediately
  currentVotes[id] = (currentVotes[id] || 0) + 1;
  myVotes.add(id);
  saveMyVotes();
  renderDestinations();

  showToast(`Voted for ${dest.name}! 🎉`, true);
  document.getElementById('info-modal').classList.remove('active');
};

const cancelVote = (id) => {
  if (!myVotes.has(id)) return;
  currentVotes[id] = Math.max(0, currentVotes[id] - 1);
  myVotes.delete(id);
  saveMyVotes();
  renderDestinations();
  showToast(`Vote removed for ${destinations.find(d=>d.id===id).name}`, true);
};


// --- Render ---
const renderDestinations = () => {
  const container = document.getElementById('destination-list');
  container.innerHTML = '';
  destinations.forEach(dest => {
    const votes = currentVotes[dest.id];
    const voted = myVotes.has(dest.id);
    const mapUrl = buildMapUrl(dest);
    const card = document.createElement('div');
    card.className = 'bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100 flex flex-col';
    card.innerHTML = `
      <div class="relative cursor-pointer group" onclick="openModal('${dest.id}')">
        <img src="${dest.img}" alt="${dest.name}" class="w-full h-48 object-cover transition duration-300 group-hover:brightness-90" onerror="this.src='https://placehold.co/500x300/e2e8f0/475569?text=${encodeURIComponent(dest.name)}'"/>
        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black bg-opacity-20">
          <span class="bg-white/90 text-gray-900 font-semibold px-4 py-2 rounded-full shadow-lg text-sm backdrop-blur-sm">Tap for Details</span>
        </div>
      </div>
      <div class="p-5 flex flex-col gap-3">
        <div class="flex justify-between items-start">
          <div class="flex-1 mr-3">
            <h2 class="text-xl font-bold text-gray-900">${dest.name}</h2>
            <p class="text-sm text-gray-500 mt-1">${dest.desc}</p>
          </div>

          <!-- Vote + Cancel button column -->
          <div class="flex flex-col items-center gap-1">
            <!-- Vote up button -->
            <button onclick="vote('${dest.id}')" class="vote-btn w-12 h-12 rounded-full flex items-center justify-center shadow-inner transition
              ${voted ? 'bg-blue-500 text-white cursor-default' : 'bg-blue-100 hover:bg-blue-200 text-blue-700'}">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>
              </svg>
            </button>

            <!-- Vote count -->
            <span class="text-2xl font-black ${votes > 0 ? 'text-blue-600' : 'text-gray-400'}">${votes}</span>
            <span class="text-xs text-gray-400 font-semibold uppercase tracking-wider mb-1">Votes</span>

            <!-- Cancel button — same size, shown only when voted -->
            ${voted ? `
            <button onclick="cancelVote('${dest.id}')" class="vote-btn w-12 h-12 rounded-full flex items-center justify-center shadow-inner transition bg-red-100 hover:bg-red-200 text-red-500">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </button>` : `<div class="w-12 h-12"></div>`}
          </div>
        </div>

        <div class="flex flex-wrap items-center gap-2">
          <span class="bg-blue-50 text-blue-700 text-xs font-bold px-2.5 py-1 rounded-md">🚗 ${dest.time}</span>
          <a href="${mapUrl}" target="_blank" class="text-xs font-semibold text-gray-600 hover:text-blue-600 underline decoration-gray-300 hover:decoration-blue-600 underline-offset-2">📍 Map${userLocation ? ' (from you)' : ''}</a>
          ${dest.rednoteUrl ? `<a href="${dest.rednoteUrl}" target="_blank" class="text-xs font-semibold text-red-600 hover:text-red-800 underline decoration-red-300 underline-offset-2">📕 小红书详情</a>` : ''}
        </div>
      </div>`;
    container.appendChild(card);
  });
};

// --- Modal ---
const openModal = (id) => {
  const dest = destinations.find(d => d.id === id);
  if (!dest) return;
  const mapUrl = buildMapUrl(dest);
  document.getElementById('modal-content').innerHTML = `
    <div class="relative">
      <img src="${dest.img}" class="w-full h-56 object-cover"/>
      <button onclick="closeModal(event,true)" class="absolute top-4 right-4 bg-black/50 hover:bg-black/70 text-white rounded-full p-2 backdrop-blur-md transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
        </svg>
      </button>
    </div>
    <div class="p-6">
      <h3 class="text-2xl font-extrabold text-gray-900">${dest.name}</h3>
      <div class="flex flex-wrap gap-3 mt-3">
        <span class="bg-gray-100 text-gray-700 text-sm font-semibold px-3 py-1.5 rounded-lg">🚗 ${dest.time}</span>
        <a href="${mapUrl}" target="_blank" class="bg-blue-50 text-blue-700 hover:bg-blue-100 text-sm font-semibold px-3 py-1.5 rounded-lg transition">📍 Open in Maps${userLocation ? ' (from you)' : ''}</a>
        ${dest.rednoteUrl ? `<a href="${dest.rednoteUrl}" target="_blank" class="bg-red-50 text-red-700 hover:bg-red-100 text-sm font-semibold px-3 py-1.5 rounded-lg transition">📕 XHS Notes</a>` : ''}
      </div>
      <p class="text-gray-600 mt-4 leading-relaxed">${dest.details}</p>
	<button onclick="vote('${dest.id}')" class="block w-full text-center bg-green-600 text-white font-bold py-3 px-4 rounded-xl mt-6 hover:bg-green-700 transition active:scale-95 shadow-lg">
        ✅ Submit Vote for ${dest.name}
      </button>


	<button onclick="closeModal(event,true)" class="mt-6 w-full bg-gray-900 hover:bg-gray-800 text-white font-bold py-3 px-4 rounded-xl transition active:scale-95">Close</button>
    </div>`;
  document.getElementById('info-modal').classList.add('active');
  document.body.style.overflow = 'hidden';
};

const closeModal = (e, force=false) => {
  if (force || e.target.id === 'info-modal') {
    document.getElementById('info-modal').classList.remove('active');
    document.body.style.overflow = 'auto';
  }
};

// --- Share ---
const shareLink = async () => {
  const url = window.location.href;
  try {
    await navigator.clipboard.writeText(url);
    showToast('Link copied! Share it to sync votes 📋', true);
  } catch {
    const ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showToast('Link copied! 📋', true); }
    catch { showToast('Could not copy — copy from the address bar.', false); }
    document.body.removeChild(ta);
  }
};

// --- Toast ---
const showToast = (msg, success=true) => {
  const toast = document.getElementById('toast');
  toast.style.backgroundColor = success ? '#22c55e' : '#ef4444';
  document.getElementById('toast-icon').textContent = success ? '✓' : '✕';
  document.getElementById('toast-message').textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), 3000);
};

// --- Init ---
const init = async () => {
  myVotes = loadMyVotes();
  await fetchVoteCounts();      // real counts from Supabase, shared across everyone
  renderDestinations();          // show something immediately, don't block on geolocation
  subscribeToVoteUpdates();      // live-sync when anyone else votes
  await getUserLocation();
  renderDestinations();          // re-render once we have location, for accurate map links
};

init();
</script>
</body>
</html>
